services:
  expenses:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - expenses-data:/app/data
    environment:
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-admin}
      - SESSION_SECRET=${SESSION_SECRET:-change-me-to-random-string}
      - DB_PATH=/app/data/expenses.db
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/auth/me"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  expenses-data:
